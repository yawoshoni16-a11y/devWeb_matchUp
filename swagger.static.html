<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Games Manager — API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/js-yaml/dist/js-yaml.min.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script>
    var yamlStr = "openapi: 3.0.3\n\ninfo:\n  title: Games Manager API\n  version: 1.0.0\n  description: |\n    REST API for managing sports games, teams, players, and fields.\n\n    ## Authentication\n    Protected routes require an `Authorization` header containing the **base64-encoded username**\n    of the authenticated user (e.g. `btoa('admin')` → `YWRtaW4=`).\n    Obtain a token by calling `POST /auth/login`.\n\nservers:\n  - url: http://localhost:3000\n    description: Local development\n\n# ---------------------------------------------------------------------------\n# Tags\n# ---------------------------------------------------------------------------\ntags:\n  - name: Auth\n    description: Authentication and session management\n  - name: Users\n    description: User accounts and profiles\n  - name: Teams\n    description: Sports teams and roster management\n  - name: Games\n    description: Game scheduling, scoring and status\n  - name: Fields\n    description: Sports fields and venues\n\n\n# ---------------------------------------------------------------------------\n# Paths\n# ---------------------------------------------------------------------------\npaths:\n\n  # ==========================================================================\n  # AUTH\n  # ==========================================================================\n\n  /auth/login:\n    post:\n      tags: [Auth]\n      summary: Log in and obtain an auth token (no auth required)\n      description: |\n        No authentication required. Validates `username` and `password` against stored users.\n        Returns a `token` (base64-encoded username) to use as the `Authorization` header on\n        subsequent requests, along with the user's `role`.\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/UserLoginDTO'\n            example:\n              username: admin\n              password: AdminPass123!\n      responses:\n        '200':\n          description: Login successful\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/AuthenticatedUserDTO'\n              example:\n                username: admin\n                token: YWRtaW4=\n        '400':\n          description: Missing or empty username / password\n        '401':\n          description: Invalid credentials\n\n  # ==========================================================================\n  # USERS\n  # ==========================================================================\n\n  /users:\n    get:\n      tags: [Users]\n      summary: List all users (any authenticated user)\n      description: |\n        Any authenticated user. Admins receive UserDTO[], others receive UserShortDTO[].\n        Inactive users excluded.\n      security:\n        - bearerToken: []\n      responses:\n        '200':\n          description: List of users (shape depends on caller role — see description)\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/UserShortDTO'\n              example:\n                - id: 1\n                  firstName: Admin\n                  lastName: User\n                - id: 2\n                  firstName: John\n                  lastName: Doe\n        '401':\n          description: Missing or invalid token\n\n    post:\n      tags: [Users]\n      summary: Create a new user (no auth required)\n      description: |\n        No authentication required. Creates a new user account.\n        The `role` field in the request body is ignored — the role is always set to `player` server-side.\n        The `password` is hashed with bcrypt before storage.\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/NewUserDTO'\n            example:\n              firstName: John\n              lastName: Doe\n              email: john@example.com\n              username: johndoe\n              password: SecurePass123!\n      responses:\n        '201':\n          description: User created\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserDTO'\n        '400':\n          description: Invalid or missing fields\n\n  /users/username/{username}:\n    get:\n      tags: [Users]\n      summary: Find a user by username (admin or referee only)\n      security:\n        - bearerToken: []\n      parameters:\n        - in: path\n          name: username\n          required: true\n          schema:\n            type: string\n      responses:\n        '200':\n          description: User found\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserDTO'\n        '401':\n          description: Missing or invalid token, or caller is not admin/referee\n        '404':\n          description: User not found\n\n  /users/email/{email}:\n    get:\n      tags: [Users]\n      summary: Find a user by email (admin or referee only)\n      security:\n        - bearerToken: []\n      parameters:\n        - in: path\n          name: email\n          required: true\n          schema:\n            type: string\n      responses:\n        '200':\n          description: User found\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserDTO'\n        '401':\n          description: Missing or invalid token, or caller is not admin/referee\n        '404':\n          description: User not found\n\n  /users/{id}:\n    get:\n      tags: [Users]\n      summary: Get a user by ID (any authenticated user)\n      description: |\n        Any authenticated user can call this endpoint.\n        - **Admin**: receives `UserDTO`.\n        - **Own profile (non-admin)**: receives `UserShortDTO`.\n        - **Other user (non-admin)**: returns 403 Forbidden.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: |\n            User profile. Admins receive `UserDTO`; own profile receives `UserShortDTO`.\n          content:\n            application/json:\n              schema:\n                oneOf:\n                  - $ref: '#/components/schemas/UserDTO'\n                  - $ref: '#/components/schemas/UserShortDTO'\n        '400':\n          description: ID is not a valid number\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Non-admin caller tried to view another user's profile\n        '404':\n          description: User not found\n\n    put:\n      tags: [Users]\n      summary: Update a user (any authenticated user)\n      description: |\n        Any authenticated user can call this endpoint.\n        An admin may update any user. A non-admin user may only update their own profile — the\n        token's user ID must match the `{id}` path parameter; attempting to update another user\n        returns 403. Body must include `id` matching the URL parameter; if body `id` and path `{id}`\n        differ, the endpoint returns 400. Fields `password`, `role`,\n        and `status` in the body are accepted but `role` and `status` are preserved from the stored\n        record server-side; only `firstName`, `lastName`, `email`, `username` are updated.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/UserDTO'\n            example:\n              id: 2\n              firstName: Jonathan\n              lastName: Doe\n              email: jonathan@example.com\n              username: johndoe\n              role: player\n              status: active\n      responses:\n        '200':\n          description: Updated user\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserDTO'\n        '400':\n          description: Invalid payload (including body/path ID mismatch)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin and tries to update another user\n        '404':\n          description: User not found\n\n    delete:\n      tags: [Users]\n      summary: Soft-delete a user (admin or self)\n      description: |\n        Requires authentication. An `admin` may soft-delete any user; a non-admin may soft-delete only their own account.\n        Attempts to delete another user as non-admin return 403.\n        Sets the user's status to `inactive`.\n        The user remains in the data store but is excluded from listings and cannot log in.\n        Admin accounts cannot be deleted.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: User deleted\n        '400':\n          description: Invalid ID or attempt to delete an admin account\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: User not found\n\n  /users/{id}/role/{role}:\n    patch:\n      tags: [Users]\n      summary: Change a user's role (admin only)\n      description: |\n        Requires `admin` role. Changes the role of the user identified by `{id}`.\n        Only users currently holding the `player` role can be promoted — attempting to change\n        the role of an `admin`, `referee`, or `trainer` returns 400.\n        Valid target roles are `player`, `referee`, `trainer`, and `admin`.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n        - in: path\n          name: role\n          required: true\n          schema:\n            $ref: '#/components/schemas/ERole'\n      responses:\n        '200':\n          description: Updated user with new role\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/UserDTO'\n        '400':\n          description: Invalid ID, invalid role value, or user is not a player\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: User not found\n\n  /users/{id}/reactivate:\n    patch:\n      tags: [Users]\n      summary: Reactivate an inactive user (admin only)\n      description: |\n        Requires `admin` role. Sets the user's status back to `active`, reversing a soft-delete.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: User reactivated (no body)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: User not found\n\n  # ==========================================================================\n  # TEAMS\n  # ==========================================================================\n\n  /teams:\n    get:\n      tags: [Teams]\n      summary: List all teams (no auth required)\n      description: |\n        No authentication required. Returns a short view of all teams (`TeamShortDTO`):\n        id, name, and sportType only. Does not include player lists or trainer details.\n      responses:\n        '200':\n          description: List of teams\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/TeamShortDTO'\n              example:\n                - id: 1\n                  name: Red Dragons\n                  sportType: football\n                - id: 2\n                  name: Blue Eagles\n                  sportType: football\n\n    post:\n      tags: [Teams]\n      summary: Create a new team (trainer only)\n      description: |\n        Requires `trainer` role. Creates a new team. The authenticated trainer is automatically\n        set as the team's `trainerId` — the `trainerId` field in the body is ignored.\n        The new team is initialized with an empty player list.\n      security:\n        - bearerToken: []\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/NewTeamDTO'\n            example:\n              name: Red Dragons\n              description: A competitive football team\n              sportType: football\n      responses:\n        '201':\n          description: Team created\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/TeamDTO'\n        '400':\n          description: Invalid or missing fields\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not a trainer\n\n  /teams/own:\n    get:\n      tags: [Teams]\n      summary: Get the teams the authenticated user belongs to (any authenticated user)\n      description: |\n        Any authenticated user can call this endpoint. Returns the full representation of all\n        teams the authenticated user is listed as a player of, or trainer for (`TeamFullDTO`), with player and\n        trainer objects resolved. Returns an empty array if the user is not in any team.\n      security:\n        - bearerToken: []\n      responses:\n        '200':\n          description: List of teams with resolved players and trainer\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/TeamFullDTO'\n        '401':\n          description: Missing or invalid token\n\n  /teams/{id}:\n    get:\n      tags: [Teams]\n      summary: Get a team by ID (no auth required)\n      description: |\n        No authentication required. Returns the standard representation of a single team (`TeamDTO`)\n        with raw player IDs and trainerId. Returns 400 if `{id}` is not a valid number,\n        404 if no team with that ID exists.\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: Team details\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/TeamDTO'\n        '400':\n          description: Invalid team ID\n        '404':\n          description: Team not found\n\n    put:\n      tags: [Teams]\n      summary: Update a team (trainer only)\n      description: |\n        Requires `trainer` role. Replaces the team's fields with the provided values.\n        Body must include `id` matching the URL parameter; if body `id` and path `{id}` differ,\n        returns 400. Body must also include `players` (array of IDs)\n        and `trainerId`.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/TeamDTO'\n            example:\n              id: 1\n              name: Red Dragons FC\n              description: Updated description\n              sportType: football\n              players: [2, 3]\n              trainerId: 5\n      responses:\n        '200':\n          description: Updated team\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/TeamDTO'\n        '400':\n          description: Invalid payload or ID mismatch\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not a trainer\n        '404':\n          description: Team not found\n\n    delete:\n      tags: [Teams]\n      summary: \"⚠️ NOT TO BE IMPLEMENTED — Delete a team (admin only, for reference only)\"\n      description: |\n        > **Note for students:** This endpoint is described here for API design completeness only.\n        > It is **not required** and **will not be graded**. Do not implement it.\n        > In the current implementation, this route is not registered and requests return `404`.\n\n        Requires `admin` role. Permanently removes the team from the data store.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '204':\n          description: Team deleted (no content)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: Team not found\n\n  /teams/{id}/join:\n    patch:\n      tags: [Teams]\n      summary: Join a team (any authenticated user)\n      description: |\n        Any authenticated user can call this endpoint. Adds the authenticated user to the team's\n        player list. The user ID is taken from the auth token — no body is required.\n        Returns 400 if the user is already a member.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: User successfully joined the team\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/TeamDTO'\n        '400':\n          description: User is already in the team\n        '401':\n          description: Missing or invalid token\n        '404':\n          description: Team not found\n\n  /teams/{id}/leave:\n    patch:\n      tags: [Teams]\n      summary: Leave a team (any authenticated user)\n      description: |\n        Any authenticated user can call this endpoint. Removes the authenticated user from the\n        team's player list. The user ID is taken from the auth token — no body is required.\n        Returns 404 if the team does not exist or the user is not a member.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: Updated team after user left\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/TeamDTO'\n        '401':\n          description: Missing or invalid token\n        '404':\n          description: Team not found or user not in team\n\n  # ==========================================================================\n  # GAMES\n  # ==========================================================================\n\n  /games:\n    get:\n      tags: [Games]\n      summary: List upcoming and ongoing games (no auth required)\n      description: |\n        No authentication required. Returns a short view of all upcoming and ongoing games\n        (`GameShortDTO`). Only games whose `scheduledDate` is today or in the future are included;\n        past games are excluded.\n      responses:\n        '200':\n          description: List of games\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/GameShortDTO'\n\n    post:\n      tags: [Games]\n      summary: Create a new game (referee only)\n      description: |\n        Requires `referee` role. Creates a new game. The authenticated referee is automatically\n        set as the game's `refereeId` if none is provided in the body. The initial status is\n        set automatically: if both `fieldId` and `scheduledDate` are present the status becomes\n        `scheduled`; otherwise it is set to `created`.\n      security:\n        - bearerToken: []\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/NewGameDTO'\n            example:\n              name: Red Dragons vs Blue Eagles\n              homeTeamId: 1\n              awayTeamId: 2\n      responses:\n        '201':\n          description: Game created\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/GameDTO'\n        '400':\n          description: Invalid or missing fields\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not a referee\n\n  /games/{id}:\n    get:\n      tags: [Games]\n      summary: Get a game by ID (no auth required)\n      description: |\n        No authentication required. Returns the full representation of a single game (`GameDTO`).\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: Game details\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/GameDTO'\n        '400':\n          description: Invalid ID\n        '404':\n          description: Game not found\n\n    put:\n      tags: [Games]\n      summary: Update a game (referee only)\n      description: |\n        Requires `referee` role. Replaces the game's fields with the provided values.\n        Body must include `id` matching the URL parameter; if body `id` and path `{id}` differ,\n        returns 400. Games in `finished` or `cancelled`\n        status cannot be updated. For games in `started` status, `fieldId`, `refereeId`,\n        `homeTeamId`, and `awayTeamId` are locked and cannot be changed.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/GameDTO'\n            example:\n              id: 1\n              name: Red Dragons vs Blue Eagles — Final\n              status: scheduled\n              homeTeamId: 1\n              awayTeamId: 2\n              scheduledDate: '2025-06-15T14:00:00.000Z'\n      responses:\n        '200':\n          description: Updated game\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/GameDTO'\n        '400':\n          description: Invalid payload (including body/path ID mismatch)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not a referee\n        '404':\n          description: Game not found\n\n    delete:\n      tags: [Games]\n      summary: Delete a game (admin only)\n      description: |\n        Requires `admin` role. Permanently removes the game from the data store (hard delete).\n        The record cannot be recovered.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '204':\n          description: Game deleted (no content)\n        '400':\n          description: Invalid ID\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '500':\n          description: Failed to delete game\n\n  /games/{id}/score/{home}/{away}:\n    patch:\n      tags: [Games]\n      summary: Set the score of a started game (referee only)\n      description: |\n        Requires `referee` role. Overwrites the home and away score of a game with the values\n        from the URL path parameters. The game must be in `started` status — any other status returns 400.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n        - in: path\n          name: home\n          required: true\n          schema:\n            type: integer\n            minimum: 0\n          description: Home team score\n        - in: path\n          name: away\n          required: true\n          schema:\n            type: integer\n            minimum: 0\n          description: Away team score\n      responses:\n        '200':\n          description: Updated game with new score\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/GameDTO'\n        '400':\n          description: Game not found, not in started status, or invalid score values\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not a referee\n\n  /games/{id}/status/{status}:\n    patch:\n      tags: [Games]\n      summary: Update game status (referee, trainer, or admin)\n      description: |\n        Requires `referee`, `trainer`, or `admin` role. Transitions the game to the requested\n        status. Allowed transitions:\n        - `created` → `cancelled`\n        - `scheduled` → `started` (requires `fieldId`, `refereeId`, `homeTeamId`, and `awayTeamId` to all be set)\n        - `scheduled` → `cancelled`\n        - `started` → `finished`\n        Any other transition returns 400.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n        - in: path\n          name: status\n          required: true\n          schema:\n            $ref: '#/components/schemas/EGameStatus'\n      responses:\n        '200':\n          description: Updated game with new status\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/GameDTO'\n        '400':\n          description: Invalid or disallowed status transition, or missing prerequisites for starting\n        '401':\n          description: Authenticated user does not have referee, trainer, or admin role\n\n  # ==========================================================================\n  # FIELDS\n  # ==========================================================================\n\n  /fields:\n    get:\n      tags: [Fields]\n      summary: List all fields (no auth required)\n      description: |\n        No authentication required. Returns all fields in the system as a `FieldDTO` array.\n      responses:\n        '200':\n          description: List of fields\n          content:\n            application/json:\n              schema:\n                type: array\n                items:\n                  $ref: '#/components/schemas/FieldDTO'\n              example:\n                - id: 1\n                  name: Main Stadium\n                  location: 123 Sports Avenue, Paris\n                  createdAt: '2024-01-01T00:00:00.000Z'\n                  updatedAt: '2024-01-01T00:00:00.000Z'\n\n    post:\n      tags: [Fields]\n      summary: Create a new field (admin only)\n      description: |\n        Requires `admin` role. Creates a new field. Both `name` and `location` are required.\n      security:\n        - bearerToken: []\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/NewFieldDTO'\n            example:\n              name: Main Stadium\n              location: 123 Sports Avenue, Paris\n      responses:\n        '201':\n          description: Field created\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/FieldDTO'\n        '400':\n          description: Name or location is missing or invalid\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n\n  /fields/{id}:\n    get:\n      tags: [Fields]\n      summary: Get a field by ID (no auth required)\n      description: |\n        No authentication required. Returns the full representation of a single field (`FieldDTO`).\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '200':\n          description: Field details\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/FieldDTO'\n        '400':\n          description: Invalid ID\n        '404':\n          description: Field not found\n\n    put:\n      tags: [Fields]\n      summary: Update a field (admin only)\n      description: |\n        Requires `admin` role. Replaces the field's `name` and `location` with the provided values.\n        Body must include `id` matching the URL parameter; if body `id` and path `{id}` differ,\n        returns 400.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      requestBody:\n        required: true\n        content:\n          application/json:\n            schema:\n              $ref: '#/components/schemas/FieldDTO'\n            example:\n              id: 1\n              name: Renovated Stadium\n              location: 456 New Street, Lyon\n      responses:\n        '200':\n          description: Updated field\n          content:\n            application/json:\n              schema:\n                $ref: '#/components/schemas/FieldDTO'\n        '400':\n          description: Invalid payload (including invalid body shape and body/path ID mismatch)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: Field not found\n\n    delete:\n      tags: [Fields]\n      summary: \"⚠️ NOT TO BE IMPLEMENTED — Delete a field (admin only, for reference only)\"\n      description: |\n        > **Note for students:** This endpoint is described here for API design completeness only.\n        > It is **not required** and **will not be graded**. Do not implement it.\n        > In the current implementation, this route is not registered and requests return `404`.\n\n        Requires `admin` role. Permanently removes the field from the data store.\n      security:\n        - bearerToken: []\n      parameters:\n        - $ref: '#/components/parameters/IdParam'\n      responses:\n        '204':\n          description: Field deleted (no content)\n        '401':\n          description: Missing or invalid token\n        '403':\n          description: Authenticated user is not an admin\n        '404':\n          description: Field not found\n\n# ---------------------------------------------------------------------------\n# Components\n# ---------------------------------------------------------------------------\ncomponents:\n\n  securitySchemes:\n    bearerToken:\n      type: apiKey\n      in: header\n      name: Authorization\n      description: |\n        Base64-encoded username. Obtain from `POST /auth/login`.\n        Example: `Authorization: YWRtaW4=` (base64 of \"admin\")\n\n  parameters:\n    IdParam:\n      in: path\n      name: id\n      required: true\n      schema:\n        type: integer\n        minimum: 1\n      description: Numeric resource ID\n      example: 1\n\n  schemas:\n    ErrorResponse:\n      type: object\n      description: |\n        Canonical JSON error shape. Note: current implementation is mixed and may also return plain\n        text or an empty body on some routes/statuses.\n      required: [error]\n      properties:\n        error:\n          type: string\n          example: Invalid request body\n\n    # -----------------------------------------------------------------------\n    # Auth schemas\n    # -----------------------------------------------------------------------\n\n    UserLoginDTO:\n      type: object\n      description: Credentials used to authenticate a user\n      required: [username, password]\n      properties:\n        username:\n          type: string\n          example: admin\n        password:\n          type: string\n          example: AdminPass123!\n\n    AuthenticatedUserDTO:\n      type: object\n      description: Successful login response containing the auth token and user role\n      required: [username, token, role]\n      properties:\n        username:\n          type: string\n          example: admin\n        token:\n          type: string\n          description: Base64-encoded username. Pass as the Authorization header value.\n          example: YWRtaW4=\n        role:\n          $ref: '#/components/schemas/ERole'\n\n    # -----------------------------------------------------------------------\n    # User schemas\n    # -----------------------------------------------------------------------\n\n    EUserStatus:\n      type: string\n      enum: [active, inactive]\n      description: |\n        User account status:\n        - `active` — account is active (default)\n        - `inactive` — account has been soft-deleted\n\n    ERole:\n      type: string\n      enum: [admin, player, referee, trainer]\n      description: |\n        User role:\n        - `admin` — full administrative access\n        - `player` — default role for regular users\n        - `referee` — assigned to officiate games\n        - `trainer` — assigned to coach a team\n\n    UserShortDTO:\n      type: object\n      description: Minimal user representation. Returned by GET /users and GET /users/:id for non-admin callers.\n      required: [id, firstName, lastName]\n      properties:\n        id:\n          type: integer\n          example: 2\n        firstName:\n          type: string\n          example: John\n        lastName:\n          type: string\n          example: Doe\n\n    UserFullDTO:\n      type: object\n      description: |\n        Full user profile with timestamps. Not currently used by any endpoint in the reverted code,\n        but kept for documentation purposes.\n      required: [id, firstName, lastName, email, username, role, status, createdAt, updatedAt]\n      properties:\n        id:\n          type: integer\n          example: 2\n        firstName:\n          type: string\n          example: John\n        lastName:\n          type: string\n          example: Doe\n        email:\n          type: string\n          format: email\n          example: john@example.com\n        username:\n          type: string\n          example: johndoe\n        role:\n          $ref: '#/components/schemas/ERole'\n        status:\n          $ref: '#/components/schemas/EUserStatus'\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-15T10:30:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-06-01T08:00:00.000Z'\n\n    UserDTO:\n      type: object\n      description: |\n        **Outbound** user representation — never contains a password in responses.\n        Returned by: GET /users (admin callers), POST /users,\n        PUT /users/:id, GET /users/username/:username, GET /users/email/:email,\n        PATCH /users/:id/role/:role.\n      required: [id, firstName, lastName, email, username, role, status]\n      properties:\n        id:\n          type: integer\n          example: 2\n        firstName:\n          type: string\n          example: John\n        lastName:\n          type: string\n          example: Doe\n        email:\n          type: string\n          format: email\n          example: john@example.com\n        username:\n          type: string\n          example: johndoe\n        password:\n          type: string\n          description: Optional — only present in inbound PUT /users/:id body; never returned in outbound responses\n        role:\n          $ref: '#/components/schemas/ERole'\n        status:\n          $ref: '#/components/schemas/EUserStatus'\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    NewUserDTO:\n      type: object\n      description: Payload for creating a user (POST /users). Role is always forced to `player`.\n      required: [firstName, lastName, email, username, password]\n      properties:\n        firstName:\n          type: string\n          example: John\n        lastName:\n          type: string\n          example: Doe\n        email:\n          type: string\n          format: email\n          example: john@example.com\n        username:\n          type: string\n          example: johndoe\n        password:\n          type: string\n          description: Plaintext password — stored hashed server-side\n          example: SecurePass123!\n\n    UserDBO:\n      type: object\n      description: |\n        **Database object** — shape stored in `data/users.json` (snake_case).\n        Used internally; never returned directly by the API.\n      required: [id, email, first_name, last_name, username, password, role, status]\n      properties:\n        id:\n          type: integer\n          example: 2\n        email:\n          type: string\n          example: john@example.com\n        first_name:\n          type: string\n          example: John\n        last_name:\n          type: string\n          example: Doe\n        username:\n          type: string\n          example: johndoe\n        password:\n          type: string\n          description: bcrypt hash\n          example: '$2b$10$...'\n        role:\n          $ref: '#/components/schemas/ERole'\n        status:\n          $ref: '#/components/schemas/EUserStatus'\n        created_at:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updated_at:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    # -----------------------------------------------------------------------\n    # Team schemas\n    # -----------------------------------------------------------------------\n\n    ESportType:\n      type: string\n      enum: [football, basketball, tennis, volleyball, handball]\n\n    TeamShortDTO:\n      type: object\n      description: Minimal team representation returned by GET /teams\n      required: [id, name, sportType]\n      properties:\n        id:\n          type: integer\n          example: 1\n        name:\n          type: string\n          example: Red Dragons\n        sportType:\n          $ref: '#/components/schemas/ESportType'\n\n    TeamDTO:\n      type: object\n      description: |\n        Standard team representation with raw player IDs and trainerId.\n        Returned by GET /teams/:id, POST /teams, PUT /teams/:id, PATCH /teams/:id/join, PATCH /teams/:id/leave.\n      required: [id, name, sportType, players, trainerId, createdAt, updatedAt]\n      properties:\n        id:\n          type: integer\n          example: 1\n        name:\n          type: string\n          example: Red Dragons\n        description:\n          type: string\n          example: A competitive football team\n        sportType:\n          $ref: '#/components/schemas/ESportType'\n        players:\n          type: array\n          items:\n            type: integer\n          description: Raw player IDs\n          example: [2, 3]\n        trainerId:\n          type: integer\n          description: Raw trainer ID\n          example: 5\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    TeamFullDTO:\n      type: object\n      description: |\n        Full team representation with **resolved** player and trainer objects.\n        Returned only by GET /teams/own.\n      required: [id, name, sportType, players, trainer, createdAt, updatedAt]\n      properties:\n        id:\n          type: integer\n          example: 1\n        name:\n          type: string\n          example: Red Dragons\n        description:\n          type: string\n          example: A competitive football team\n        sportType:\n          $ref: '#/components/schemas/ESportType'\n        players:\n          type: array\n          items:\n            $ref: '#/components/schemas/UserShortDTO'\n          description: Resolved player objects\n          example:\n            - id: 2\n              firstName: John\n              lastName: Doe\n        trainer:\n          $ref: '#/components/schemas/UserShortDTO'\n          description: Resolved trainer object\n          example:\n            id: 5\n            firstName: Trainer\n            lastName: One\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    NewTeamDTO:\n      type: object\n      description: Payload for creating a team (POST /teams)\n      required: [name, sportType]\n      properties:\n        name:\n          type: string\n          example: Red Dragons\n        description:\n          type: string\n          description: Optional — defaults to empty string\n          example: A competitive football team\n        sportType:\n          $ref: '#/components/schemas/ESportType'\n\n    TeamDBO:\n      type: object\n      description: |\n        **Database object** — shape stored in `data/teams.json` (snake_case).\n        Used internally; never returned directly by the API.\n      required: [id, name, sport_type, players, created_at, updated_at]\n      properties:\n        id:\n          type: integer\n        name:\n          type: string\n        description:\n          type: string\n        sport_type:\n          $ref: '#/components/schemas/ESportType'\n        players:\n          type: array\n          items:\n            type: integer\n        trainer_id:\n          type: integer\n          nullable: true\n        created_at:\n          type: string\n          format: date-time\n        updated_at:\n          type: string\n          format: date-time\n\n    # -----------------------------------------------------------------------\n    # Game schemas\n    # -----------------------------------------------------------------------\n\n    EGameStatus:\n      type: string\n      enum: [created, scheduled, started, finished, cancelled]\n      description: |\n        Lifecycle status of a game (all lowercase):\n        - `created` — initial state, no field or date assigned\n        - `scheduled` — field and date are set (auto-assigned on create/update)\n        - `started` — game is in progress\n        - `finished` — game has ended\n        - `cancelled` — game was cancelled\n\n        **Allowed transitions:**\n        - `created` → `cancelled`\n        - `scheduled` → `started` | `cancelled`\n        - `started` → `finished`\n\n    GameShortDTO:\n      type: object\n      description: |\n        Minimal game representation returned by `GET /games`.\n        Only includes fields useful for listing; no scores, no timestamps.\n      required: [id, status]\n      properties:\n        id:\n          type: integer\n          example: 1\n        status:\n          $ref: '#/components/schemas/EGameStatus'\n        name:\n          type: string\n          example: Red Dragons vs Blue Eagles\n        fieldId:\n          type: integer\n          nullable: true\n          example: null\n        homeTeamId:\n          type: integer\n          example: 1\n        awayTeamId:\n          type: integer\n          example: 2\n        scheduledDate:\n          type: string\n          format: date-time\n          nullable: true\n          example: '2099-01-01T00:00:00.000Z'\n\n    GameDTO:\n      type: object\n      description: Full game representation returned by most game endpoints.\n      required: [id, status]\n      properties:\n        id:\n          type: integer\n          example: 1\n        status:\n          $ref: '#/components/schemas/EGameStatus'\n        name:\n          type: string\n          example: Red Dragons vs Blue Eagles\n        fieldId:\n          type: integer\n          nullable: true\n          example: 1\n        refereeId:\n          type: integer\n          nullable: true\n          example: 4\n        homeTeamId:\n          type: integer\n          example: 1\n        awayTeamId:\n          type: integer\n          example: 2\n        homeScore:\n          type: integer\n          nullable: true\n          example: 0\n        awayScore:\n          type: integer\n          nullable: true\n          example: 0\n        scheduledDate:\n          type: string\n          format: date-time\n          nullable: true\n          example: '2099-01-01T00:00:00.000Z'\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    NewGameDTO:\n      type: object\n      description: Payload for creating a game (POST /games). All fields are optional.\n      properties:\n        name:\n          type: string\n          example: Red Dragons vs Blue Eagles\n        fieldId:\n          type: integer\n          example: 1\n        refereeId:\n          type: integer\n          example: 4\n        homeTeamId:\n          type: integer\n          example: 1\n        awayTeamId:\n          type: integer\n          example: 2\n        scheduledDate:\n          type: string\n          format: date-time\n          example: '2099-01-01T00:00:00.000Z'\n\n    NewFieldDTO:\n      type: object\n      description: Payload for creating a field (POST /fields).\n      required: [name, location]\n      properties:\n        name:\n          type: string\n          example: Main Stadium\n        location:\n          type: string\n          example: 123 Sports Avenue, Paris\n\n    GameDBO:\n      type: object\n      description: |\n        **Database object** — shape stored in `data/games.json` (snake_case).\n        Used internally; never returned directly by the API.\n      required: [id, status, created_at, updated_at]\n      properties:\n        id:\n          type: integer\n        status:\n          $ref: '#/components/schemas/EGameStatus'\n        name:\n          type: string\n        field_id:\n          type: integer\n          nullable: true\n        referee_id:\n          type: integer\n          nullable: true\n        home_team_id:\n          type: integer\n        away_team_id:\n          type: integer\n        home_score:\n          type: integer\n          nullable: true\n        away_score:\n          type: integer\n          nullable: true\n        scheduled_date:\n          type: string\n          format: date-time\n          nullable: true\n        created_at:\n          type: string\n          format: date-time\n        updated_at:\n          type: string\n          format: date-time\n\n    # -----------------------------------------------------------------------\n    # Field schemas\n    # -----------------------------------------------------------------------\n\n    FieldDTO:\n      type: object\n      description: Field representation returned by field endpoints.\n      required: [id, name, location]\n      properties:\n        id:\n          type: integer\n          example: 1\n        name:\n          type: string\n          example: Main Stadium\n        location:\n          type: string\n          example: 123 Sports Avenue, Paris\n        createdAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n        updatedAt:\n          type: string\n          format: date-time\n          example: '2024-01-01T00:00:00.000Z'\n\n    FieldDBO:\n      type: object\n      description: |\n        **Database object** — shape stored in `data/fields.json` (snake_case).\n        Used internally; never returned directly by the API.\n      required: [id, name, location, created_at, updated_at]\n      properties:\n        id:\n          type: integer\n        name:\n          type: string\n        location:\n          type: string\n        created_at:\n          type: string\n          format: date-time\n        updated_at:\n          type: string\n          format: date-time\n";
    SwaggerUIBundle({
